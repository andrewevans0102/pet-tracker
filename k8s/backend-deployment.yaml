apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-tracker-backend
  namespace: pet-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pet-tracker-backend
  template:
    metadata:
      labels:
        app: pet-tracker-backend
    spec:
      containers:
        - name: backend
          image: pet-tracker-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
