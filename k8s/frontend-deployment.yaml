apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-tracker-frontend
  namespace: pet-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pet-tracker-frontend
  template:
    metadata:
      labels:
        app: pet-tracker-frontend
    spec:
      containers:
        - name: frontend
          image: pet-tracker-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
